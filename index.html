<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Wheel Pro - Gemini AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        #wheel-container {
            position: relative;
            width: 80vw;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        #wheel-canvas {
            width: 100%;
            height: 100%;
        }
        .pointer-top {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.6));
        }
        .tab-content {
            display: none;
            height: calc(100vh - 180px);
            overflow-y: auto;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .nav-btn.active { color: #f43f5e; }
        .nav-btn.active div { background: rgba(244, 63, 94, 0.2); }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-4 text-center border-b border-white/10 bg-slate-950/50 backdrop-blur-md relative">
        <h1 class="text-3xl font-black italic tracking-tighter bg-gradient-to-r from-rose-500 via-fuchsia-500 to-indigo-500 bg-clip-text text-transparent uppercase">
            Party Wheel ✨
        </h1>
        <p id="cloud-status" class="text-[10px] text-slate-500 italic mt-1 leading-none">พร้อมใช้งาน</p>
        
        <button id="mute-toggle-btn" class="absolute right-4 top-4 p-2 bg-white/5 rounded-full border border-white/10 active:scale-90 transition-all">
            <svg id="sound-icon-on" class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
            </svg>
            <svg id="sound-icon-off" class="w-6 h-6 text-rose-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
            </svg>
        </button>
    </header>

    <main class="flex-1 p-4 no-scrollbar overflow-y-auto flex flex-col">
        
        <!-- Tab 1: Setup -->
        <div id="tab-setup" class="tab-content space-y-4">
            <div class="bg-slate-900/60 p-5 rounded-3xl border border-white/5 shadow-xl">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-rose-400">👥 รายชื่อนักดื่ม</h2>
                <textarea id="names-input" class="w-full h-44 bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:ring-2 focus:ring-rose-500 focus:outline-none transition-all resize-none text-sm" placeholder="พิมพ์ชื่อคนละ 1 บรรทัดที่นี่..."></textarea>
                <div class="mt-3 flex gap-2">
                    <button id="save-btn" class="flex-1 bg-indigo-600 active:bg-indigo-700 py-3 rounded-xl text-sm font-bold transition-all uppercase shadow-lg shadow-indigo-900/20">💾 บันทึก Cloud</button>
                    <button id="clear-btn" class="px-6 bg-slate-800 active:bg-slate-700 rounded-xl text-sm font-bold transition-all">ล้างชื่อ</button>
                </div>
            </div>

            <div class="bg-slate-900/60 p-5 rounded-3xl border border-white/5">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-amber-400">🍺 ภารกิจหลัก</h2>
                <textarea id="missions-input" class="w-full h-32 bg-black/40 border border-white/10 rounded-2xl p-3 text-white text-xs focus:ring-2 focus:ring-amber-500 focus:outline-none transition-all resize-none" readonly>หมดแก้ว
ครึ่งแก้ว
สั่งใครก็ได้ดื่ม
รอดตัวไป!
คนข้างซ้ายดื่ม
คนข้างขวาดื่ม
กินกับแกล้ม</textarea>
            </div>
        </div>

        <!-- Tab 2: Wheel -->
        <div id="tab-wheel" class="tab-content active items-center justify-center gap-6 py-4">
            <div id="wheel-container">
                <div class="pointer-top">
                    <svg width="40" height="70" viewBox="0 0 50 90">
                        <path d="M5 10 Q5 0 25 0 Q45 0 45 10 V55 L35 65 V85 H15 V65 L5 55 Z" fill="#f43f5e" />
                        <rect x="10" y="20" width="30" height="25" rx="2" fill="white" opacity="0.2" />
                        <rect x="20" y="85" width="10" height="5" fill="#991b1b" />
                        <path d="M20 90 L30 90 L25 95 Z" fill="#991b1b" />
                    </svg>
                </div>
                <canvas id="wheel-canvas" width="1000" height="1000"></canvas>
            </div>

            <div class="w-full max-w-[300px] flex flex-col gap-4">
                <button id="spin-button" class="w-full py-6 bg-gradient-to-r from-rose-600 to-pink-500 rounded-full font-black text-3xl uppercase tracking-widest shadow-[0_10px_40px_rgba(244,63,94,0.4)] active:scale-90 transition-all disabled:opacity-50">
                    Spin!
                </button>

                <div class="flex items-center justify-between px-6 py-3 bg-white/5 rounded-2xl border border-white/5 backdrop-blur-sm">
                    <span class="text-sm font-bold text-slate-300">ตัดชื่อคนโดนออก</span>
                    <input type="checkbox" id="remove-mode" class="w-6 h-6 accent-rose-500 rounded-lg">
                </div>

                <button id="restore-btn" class="w-full py-3 bg-slate-800/80 hover:bg-slate-700 text-slate-300 rounded-2xl text-sm font-bold border border-white/5 active:scale-95 transition-all">
                    🔄 คืนค่ารายชื่อล่าสุด
                </button>
            </div>
        </div>

        <!-- Tab 3: History -->
        <div id="tab-history" class="tab-content">
            <div class="bg-slate-900/60 p-5 rounded-3xl border border-white/5 min-h-[300px] flex flex-col shadow-2xl">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-400">📜 ประวัติรอบนี้</h2>
                <div id="history-list" class="flex-1 space-y-3">
                    <p class="text-slate-600 text-center text-sm py-10">ยังไม่มีประวัติการสุ่ม</p>
                </div>
                <button id="clear-history-btn" class="mt-6 w-full py-3 text-sm text-rose-400 font-bold border border-rose-500/20 rounded-2xl active:bg-rose-500/10">ล้างประวัติทั้งหมด</button>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-slate-950/80 backdrop-blur-xl border-t border-white/10 p-2 pb-6 flex justify-around items-center">
        <button id="nav-setup-btn" class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-500">
            <span class="text-xl">⚙️</span>
            <span class="text-[10px] font-bold uppercase">ตั้งค่า</span>
        </button>
        <button id="nav-wheel-btn" class="nav-btn active flex flex-col items-center gap-1 p-2 text-rose-500">
            <div class="p-3 rounded-2xl">
                <span class="text-2xl">🎡</span>
            </div>
            <span class="text-[10px] font-bold uppercase">วงล้อ</span>
        </button>
        <button id="nav-history-btn" class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-500">
            <span class="text-xl">📜</span>
            <span class="text-[10px] font-bold uppercase">ประวัติ</span>
        </button>
    </nav>

    <!-- Modal ผู้โชคดี -->
    <div id="result-modal" class="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="max-w-xs w-full mx-4 bg-slate-900 p-8 rounded-[2.5rem] border border-white/10 text-center transform scale-75 transition-transform duration-300 shadow-2xl">
            <div class="text-rose-500 text-xs font-bold tracking-widest mb-2 uppercase leading-none">ผู้โชคดีคือ!</div>
            <div id="winner-name" class="text-5xl font-black text-white mb-4 break-words leading-tight">?</div>
            <div id="mission-box" class="mt-4 p-5 bg-white/5 rounded-3xl border border-amber-500/30">
                <div class="text-amber-500 text-[10px] font-bold mb-1 uppercase tracking-widest">ภารกิจ:</div>
                <div id="winner-mission" class="text-xl font-bold text-amber-400 italic">...</div>
                <button id="ai-btn" class="mt-4 w-full py-2 bg-indigo-600/20 text-indigo-400 text-[10px] rounded-xl border border-indigo-500/30 transition-all font-bold">✨ ขอภารกิจป่วนจาก AI</button>
            </div>
            <button id="close-modal-btn" class="mt-8 w-full py-4 bg-white text-black rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-xl">ไปต่อ!</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- ตั้งค่าเบื้องต้น ---
        const apiKey = ""; // ใส่ Gemini API Key ของคุณ
        const appId = 'party-wheel-prod';
        let db, auth, user;

        // --- UI Logic (ทำงานทันที) ---
        const cloudStatus = document.getElementById('cloud-status');
        const namesInput = document.getElementById('names-input');
        const missionsInput = document.getElementById('missions-input');
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-button');
        const historyList = document.getElementById('history-list');
        const soundOnIcon = document.getElementById('sound-icon-on');
        const soundOffIcon = document.getElementById('sound-icon-off');

        let names = [];
        let rotation = 0;
        let isSpinning = false;
        let lastWinnerName = "";
        let isMuted = false;
        const colors = ['#f43f5e', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#6366f1', '#06b6d4'];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // ฟังก์ชันสลับหน้า
        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active', 'text-rose-500');
                btn.classList.add('text-slate-500');
            });
            const activeNav = document.getElementById(`nav-${tabName}-btn`);
            activeNav.classList.add('active', 'text-rose-500');
            activeNav.classList.remove('text-slate-500');
        };

        // ผูกปุ่มกดทันที
        document.getElementById('nav-setup-btn').onclick = () => window.switchTab('setup');
        document.getElementById('nav-wheel-btn').onclick = () => window.switchTab('wheel');
        document.getElementById('nav-history-btn').onclick = () => window.switchTab('history');
        document.getElementById('mute-toggle-btn').onclick = () => {
            isMuted = !isMuted;
            soundOnIcon.classList.toggle('hidden', isMuted);
            soundOffIcon.classList.toggle('hidden', !isMuted);
            if (!isMuted && audioCtx.state === 'suspended') audioCtx.resume();
        };

        // ฟังก์ชันจัดการวงล้อ
        const updateWheel = () => {
            names = namesInput.value.split('\n').map(n => n.trim()).filter(n => n !== "");
            draw();
        };
        namesInput.oninput = updateWheel;

        function draw() {
            const centerX = 500, centerY = 500, radius = 460;
            ctx.clearRect(0, 0, 1000, 1000);
            if (names.length === 0) {
                ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#475569"; ctx.textAlign = "center"; ctx.font = "bold 40px Kanit"; ctx.fillText("ใส่รายชื่อในหน้าตั้งค่า ⚙️", centerX, centerY);
                return;
            }
            const slice = (Math.PI * 2) / names.length;
            names.forEach((name, i) => {
                const start = i * slice + rotation;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.arc(centerX, centerY, radius, start, start + slice); ctx.fill();
                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(start + slice / 2); ctx.textAlign = "right"; ctx.fillStyle = "#fff";
                let fontSize = names.length > 20 ? 28 : (names.length > 10 ? 44 : 68);
                ctx.font = `900 ${fontSize}px Kanit`; ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.fillText(name.substring(0, 12), radius - 40, fontSize/3); ctx.restore();
            });
            ctx.fillStyle = "#020617"; ctx.beginPath(); ctx.arc(centerX, centerY, 50, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 8; ctx.stroke();
        }

        spinBtn.onclick = () => {
            if (isSpinning || names.length === 0) return;
            isSpinning = true; spinBtn.disabled = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const duration = 5000; const startRot = rotation;
            const extra = 15 + Math.random() * 10; const targetRot = startRot + (extra * Math.PI * 2);
            const startTime = performance.now(); let lastTick = 0;
            function animate(now) {
                const elapsed = now - startTime; const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 5); rotation = startRot + (targetRot - startRot) * eased;
                const sliceAngle = (Math.PI * 2) / names.length;
                if (Math.floor(rotation / (sliceAngle / 1)) !== lastTick) {
                    if (!isMuted) {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.frequency.setValueAtTime(800 - (progress * 200), audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                    }
                    lastTick = Math.floor(rotation / (sliceAngle / 1));
                }
                draw();
                if (progress < 1) requestAnimationFrame(animate);
                else {
                    isSpinning = false; spinBtn.disabled = false;
                    const normalized = rotation % (Math.PI * 2);
                    let idx = Math.floor(( (Math.PI * 1.5) - normalized ) / ( (Math.PI * 2) / names.length )) % names.length;
                    if (idx < 0) idx += names.length;
                    lastWinnerName = names[idx];
                    showResult(lastWinnerName, idx);
                }
            }
            requestAnimationFrame(animate);
        };

        function showResult(name, index) {
            document.getElementById('winner-name').textContent = name;
            document.getElementById('result-modal').classList.remove('hidden');
            const missions = missionsInput.value.split('\n').filter(m => m.trim());
            let mIdx = 0; 
            const mInt = setInterval(() => { document.getElementById('winner-mission').textContent = missions[mIdx++ % missions.length]; }, 80);
            setTimeout(() => {
                clearInterval(mInt);
                const finalM = missions[Math.floor(Math.random() * missions.length)];
                document.getElementById('winner-mission').textContent = finalM;
                const div = document.createElement('div');
                div.className = "bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center";
                div.innerHTML = `<div><div class="text-rose-400 font-bold">${name}</div><div class="text-xs text-slate-400">${finalM}</div></div><div class="text-[10px] text-slate-600">${new Date().toLocaleTimeString('th-TH')}</div>`;
                const list = document.getElementById('history-list');
                if (list.querySelector('p')) list.innerHTML = '';
                list.prepend(div);
                if (document.getElementById('remove-mode').checked) { names.splice(index, 1); namesInput.value = names.join('\n'); updateWheel(); }
            }, 1200);
            setTimeout(() => { document.getElementById('result-modal').classList.add('opacity-100'); }, 10);
        }

        document.getElementById('close-modal-btn').onclick = () => {
            const m = document.getElementById('result-modal'); m.classList.remove('opacity-100');
            setTimeout(() => { m.classList.add('hidden'); }, 300);
        };

        // --- ระบบ Cloud (ทำงานพื้นหลัง ไม่ขวาง UI) ---
        const startCloud = async () => {
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const config = JSON.parse(__firebase_config);
                    const app = initializeApp(config);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                    onAuthStateChanged(auth, async (u) => {
                        user = u;
                        if (user) {
                            cloudStatus.textContent = "เชื่อมต่อระบบ Cloud แล้ว ✅";
                            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'party_config', 'settings'));
                            if (snap.exists()) { namesInput.value = snap.data().names.join('\n'); updateWheel(); }
                        }
                    });
                } else { cloudStatus.textContent = "โหมดเล่นในเครื่อง 🏠"; }
            } catch (e) { cloudStatus.textContent = "โหมดเล่นในเครื่อง 🏠"; }
        };

        document.getElementById('save-btn').onclick = async () => {
            if (!db || !user) { cloudStatus.textContent = "บันทึก Cloud ไม่ได้ (ขาด Config)"; return; }
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'party_config', 'settings'), {
                    names: namesInput.value.split('\n').filter(n => n.trim()),
                    updatedAt: new Date()
                });
                cloudStatus.textContent = "บันทึกเรียบร้อย ✅";
            } catch (e) { cloudStatus.textContent = "บันทึกไม่สำเร็จ"; }
        };

        document.getElementById('restore-btn').onclick = async () => {
            if (!db || !user || isSpinning) return;
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'party_config', 'settings'));
            if (snap.exists()) { namesInput.value = snap.data().names.join('\n'); updateWheel(); }
        };

        document.getElementById('clear-btn').onclick = () => { namesInput.value = ""; updateWheel(); };

        document.getElementById('ai-btn').onclick = async () => {
            if (!apiKey) { cloudStatus.textContent = "กรุณาใส่ API Key ในโค้ด"; return; }
            const btn = document.getElementById('ai-btn'); btn.textContent = "🪄 กำลังคิด..."; btn.disabled = true;
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "ขอภารกิจสั้นๆ ฮาๆ สำหรับ " + lastWinnerName }] }], systemInstruction: { parts: [{ text: "คุณเป็นเพื่อนในวงเหล้ากวนๆ คิดภารกิจสั้นมาก 1 ประโยคไทยเท่านั้น" }] } })
                });
                const res = await r.json(); const aiText = res.candidates?.[0]?.content?.parts?.[0]?.text;
                if (aiText) document.getElementById('winner-mission').textContent = aiText.trim();
            } catch (e) { document.getElementById('winner-mission').textContent = "AI เมาค้างอยู่..."; }
            finally { btn.textContent = "✨ ขอภารกิจป่วนจาก AI"; btn.disabled = false; }
        };

        // เริ่มต้น
        updateWheel();
        startCloud();
    </script>
</body>
</html>
